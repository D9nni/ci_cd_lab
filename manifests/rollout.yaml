apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: go-simple-webserver
  labels:
    app: go-simple-webserver
spec:
  replicas: 10
  strategy:
    canary:
      steps:
        - setWeight: 50
        - pause: { duration: 60s }
        - setWeight: 100
  selector:
    matchLabels:
      app: go-simple-webserver
  template:
    metadata:
      labels:
        app: go-simple-webserver
    spec:
      containers:
        - name: webserver
          image: ghcr.io/d9nni/ci_cd_lab@sha256:d52f042b98cacf98e0a6e21c60b17d52f65e7991ca488611703cbe94d9fd35d2
          ports:
            - containerPort: 8080
          imagePullPolicy: Always
